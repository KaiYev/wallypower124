<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DEAR FRIEND</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: 'Nunito', sans-serif;
    color: #2b3a4a;
  }

  body {
    background: linear-gradient(180deg, #6bb6ea 0%, #8fc9ef 22%, #b9dff5 48%, #dcf0fb 75%, #f3faff 100%);
    background-attachment: fixed;
    position: relative;
    overflow-x: hidden;
  }

  body::before, body::after {
    content: "";
    position: fixed;
    pointer-events: none;
    z-index: 0;
    background-repeat: no-repeat;
    filter: blur(1px);
    opacity: 0.9;
  }
  body::before {
    top: -40px; left: -10%;
    width: 500px; height: 200px;
    background:
      radial-gradient(60px 40px at 20% 60%, #ffffff 90%, transparent),
      radial-gradient(90px 55px at 45% 40%, #ffffff 90%, transparent),
      radial-gradient(70px 45px at 70% 55%, #ffffff 90%, transparent),
      radial-gradient(50px 35px at 85% 65%, #ffffff 90%, transparent);
  }
  body::after {
    top: 220px; right: -15%;
    width: 460px; height: 180px;
    background:
      radial-gradient(55px 38px at 25% 55%, #ffffff 85%, transparent),
      radial-gradient(80px 50px at 50% 40%, #ffffff 85%, transparent),
      radial-gradient(60px 40px at 75% 60%, #ffffff 85%, transparent);
    opacity: 0.6;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.5);
    padding: 28px 20px 20px;
    text-align: center;
  }
  header .logo {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 40px;
    letter-spacing: -0.5px;
    color: #ffffff;
    text-shadow: 0 2px 0 #6bb6ea, 0 4px 14px rgba(60, 120, 170, 0.35);
  }
  header .sub {
    margin-top: 6px;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 700;
    color: #4a7ba3;
  }
  header .sub b { color: #ffffff; -webkit-text-stroke: 0.3px #4a7ba3; }
  header a.admin-link {
    display: inline-block;
    margin-top: 12px;
    font-size: 12px;
    font-weight: 700;
    color: #ffffff;
    background: #6bb6ea;
    padding: 6px 14px;
    border-radius: 20px;
    text-decoration: none;
    box-shadow: 0 3px 10px rgba(107, 182, 234, 0.5);
  }
  header a.admin-link:hover { background: #4a9bd6; }

  main {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  .grid {
    column-count: 2;
    column-gap: 22px;
  }
  @media (min-width: 640px) { .grid { column-count: 3; } }
  @media (min-width: 960px) { .grid { column-count: 4; } }
  @media (min-width: 1280px) { .grid { column-count: 5; } }

  .tile {
    break-inside: avoid;
    margin-bottom: 22px;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.6);
    position: relative;
    display: flex;
    align-items: flex-end;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 14px;
    min-height: 140px;
    opacity: 1;
    box-shadow: 0 8px 20px rgba(74, 123, 163, 0.18);
    transform: rotate(var(--rot, 0deg));
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .tile:hover {
    transform: rotate(0deg) scale(1.03);
    box-shadow: 0 14px 30px rgba(74, 123, 163, 0.3);
    z-index: 5;
  }
  .tile img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .tile span.txt { position: relative; z-index: 1; }
  .tile.has-img { color: #fff; }
  .tile.has-img::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(20, 50, 80, 0.55), transparent 60%);
    z-index: 0;
  }

  .tile.flash {
    background:
      radial-gradient(30px 18px at 25% 30%, #ffffff 85%, transparent),
      radial-gradient(40px 22px at 60% 55%, #ffffff 85%, transparent),
      radial-gradient(25px 16px at 80% 25%, #ffffff 85%, transparent),
      linear-gradient(160deg, #8fc9ef, #bfe3f7);
    color: #2b3a4a;
  }
  .tile.holo {
    background: linear-gradient(135deg, #ffd6e8, #c9b6ff, #8fc9ef);
    color: #33314f;
  }
  .tile.mono {
    background: linear-gradient(160deg, #274a6e, #1a3350);
    color: #eaf4fb;
  }
  .tile.paper {
    background: #ffffff;
    color: #2b3a4a;
    box-shadow: 0 10px 24px rgba(74, 123, 163, 0.22);
  }

  .tile .stamp {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 2;
    font-family: 'Baloo 2', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    background: #ffffff;
    color: #4a7ba3;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(74, 123, 163, 0.3);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #4a7ba3;
    font-size: 14px;
    font-weight: 600;
  }
  .empty a { color: #ffffff; background: #6bb6ea; padding: 4px 10px; border-radius: 14px; text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Dear Friend</div>
  <div class="sub">exclusive · <b>backstage</b> · uncensored</div>
  <a class="admin-link" href="admin.html">+ добавить пост</a>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">
    Постов пока нет. <a href="admin.html">Добавь первый →</a>
  </div>
</main>

<script>
  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('empty');

  function renderTile(post, index) {
    const tile = document.createElement('div');
    tile.className = 'tile ' + (post.style || 'mono') + (post.image ? ' has-img' : '');

    const rot = (Math.random() * 6 - 3).toFixed(1);
    const offset = Math.floor(Math.random() * 24);
    tile.style.setProperty('--rot', rot + 'deg');
    tile.style.marginTop = offset + 'px';

    let html = '';
    if (post.stamp) html += `<span class="stamp">${post.stamp}</span>`;
    if (post.image) html += `<img src="${post.image}" alt="">`;
    html += `<span class="txt">${post.caption || ''}</span>`;
    tile.innerHTML = html;
    return tile;
  }

  fetch('content.json?_=' + Date.now())
    .then(res => res.json())
    .then(posts => {
      if (!posts.length) {
        emptyMsg.style.display = 'block';
        return;
      }
      posts.slice().reverse().forEach((post, i) => {
        grid.appendChild(renderTile(post, i));
      });
    })
    .catch(() => {
      emptyMsg.textContent = 'Не смог загрузить content.json — проверь, что файл лежит рядом с index.html.';
      emptyMsg.style.display = 'block';
    });
</script>

</body>
</html>
